naftiko: 1.0.0-alpha2
info:
  label: Optimizely Feature Experimentation REST API — Attributes
  description: 'Optimizely Feature Experimentation REST API — Attributes. 1 operations. Lead operation: List attributes. Self-contained
    Naftiko capability covering one Optimizely business surface.'
  tags:
  - Optimizely
  - Attributes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPTIMIZELY_API_KEY: OPTIMIZELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: feature-experimentation-attributes
    baseUri: https://api.optimizely.com/v2
    description: Optimizely Feature Experimentation REST API — Attributes business capability. Self-contained, no shared references.
    resources:
    - name: attributes
      path: /attributes
      operations:
      - name: listattributes
        method: GET
        description: List attributes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.OPTIMIZELY_API_KEY}}'
  exposes:
  - type: rest
    namespace: feature-experimentation-attributes-rest
    port: 8080
    description: REST adapter for Optimizely Feature Experimentation REST API — Attributes. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/attributes
      name: attributes
      description: REST surface for attributes.
      operations:
      - method: GET
        name: listattributes
        description: List attributes
        call: feature-experimentation-attributes.listattributes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: feature-experimentation-attributes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Optimizely Feature Experimentation REST API — Attributes. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-attributes
      description: List attributes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: feature-experimentation-attributes.listattributes
      outputParameters:
      - type: object
        mapping: $.
