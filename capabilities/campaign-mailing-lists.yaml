naftiko: 1.0.0-alpha2
info:
  label: Optimizely Campaign REST API — Mailing Lists
  description: 'Optimizely Campaign REST API — Mailing Lists. 2 operations. Lead operation: List mailing lists. Self-contained
    Naftiko capability covering one Optimizely business surface.'
  tags:
  - Optimizely
  - Mailing Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPTIMIZELY_API_KEY: OPTIMIZELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: campaign-mailing-lists
    baseUri: https://api.campaign.episerver.net/rest
    description: Optimizely Campaign REST API — Mailing Lists business capability. Self-contained, no shared references.
    resources:
    - name: clientId-mailinglists
      path: /{clientId}/mailinglists
      operations:
      - name: listmailinglists
        method: GET
        description: List mailing lists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clientId-mailinglists-mailingListId
      path: /{clientId}/mailinglists/{mailingListId}
      operations:
      - name: getmailinglist
        method: GET
        description: Get a mailing list
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.OPTIMIZELY_USER}}'
      password: '{{env.OPTIMIZELY_PASS}}'
  exposes:
  - type: rest
    namespace: campaign-mailing-lists-rest
    port: 8080
    description: REST adapter for Optimizely Campaign REST API — Mailing Lists. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/{clientid}/mailinglists
      name: clientid-mailinglists
      description: REST surface for clientId-mailinglists.
      operations:
      - method: GET
        name: listmailinglists
        description: List mailing lists
        call: campaign-mailing-lists.listmailinglists
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{clientid}/mailinglists/{mailinglistid}
      name: clientid-mailinglists-mailinglistid
      description: REST surface for clientId-mailinglists-mailingListId.
      operations:
      - method: GET
        name: getmailinglist
        description: Get a mailing list
        call: campaign-mailing-lists.getmailinglist
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: campaign-mailing-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for Optimizely Campaign REST API — Mailing Lists. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-mailing-lists
      description: List mailing lists
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: campaign-mailing-lists.listmailinglists
      outputParameters:
      - type: object
        mapping: $.
    - name: get-mailing-list
      description: Get a mailing list
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: campaign-mailing-lists.getmailinglist
      outputParameters:
      - type: object
        mapping: $.
