naftiko: 1.0.0-alpha2
info:
  label: Optimizely Web Experimentation REST API — Extensions
  description: 'Optimizely Web Experimentation REST API — Extensions. 1 operations. Lead operation: List extensions. Self-contained
    Naftiko capability covering one Optimizely business surface.'
  tags:
  - Optimizely
  - Extensions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPTIMIZELY_API_KEY: OPTIMIZELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-experimentation-extensions
    baseUri: https://api.optimizely.com/v2
    description: Optimizely Web Experimentation REST API — Extensions business capability. Self-contained, no shared references.
    resources:
    - name: extensions
      path: /extensions
      operations:
      - name: listextensions
        method: GET
        description: List extensions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.OPTIMIZELY_API_KEY}}'
  exposes:
  - type: rest
    namespace: web-experimentation-extensions-rest
    port: 8080
    description: REST adapter for Optimizely Web Experimentation REST API — Extensions. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/extensions
      name: extensions
      description: REST surface for extensions.
      operations:
      - method: GET
        name: listextensions
        description: List extensions
        call: web-experimentation-extensions.listextensions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: web-experimentation-extensions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Optimizely Web Experimentation REST API — Extensions. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-extensions
      description: List extensions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: web-experimentation-extensions.listextensions
      outputParameters:
      - type: object
        mapping: $.
