naftiko: 1.0.0-alpha2
info:
  label: Optimizely Feature Experimentation REST API — Experiments
  description: 'Optimizely Feature Experimentation REST API — Experiments. 5 operations. Lead operation: List experiments.
    Self-contained Naftiko capability covering one Optimizely business surface.'
  tags:
