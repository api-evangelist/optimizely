    description: Optimizely Feature Experimentation REST API — Experiments business capability. Self-contained, no shared
      references.
    resources:
    - name: experiments
      path: /experiments
      operations:
      - name: listexperiments
        method: GET
        description: List experiments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createexperiment
        method: POST
        description: Create an experiment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: experiments-experiment_id
      path: /experiments/{experiment_id}
      operations:
      - name: getexperiment
        method: GET
        description: Get an experiment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateexperiment
        method: PATCH
        description: Update an experiment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
