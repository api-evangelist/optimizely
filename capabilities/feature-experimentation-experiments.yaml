      call: feature-experimentation-experiments.getexperiment
      outputParameters:
      - type: object
        mapping: $.
    - name: update-experiment
      description: Update an experiment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: feature-experimentation-experiments.updateexperiment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-experiment
