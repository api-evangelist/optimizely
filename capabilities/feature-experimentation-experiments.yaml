    transport: http
    description: MCP adapter for Optimizely Feature Experimentation REST API — Experiments. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-experiments
      description: List experiments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
