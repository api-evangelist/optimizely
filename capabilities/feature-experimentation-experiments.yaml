    namespace: feature-experimentation-experiments-rest
    port: 8080
    description: REST adapter for Optimizely Feature Experimentation REST API — Experiments. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/experiments
      name: experiments
      description: REST surface for experiments.
      operations:
      - method: GET
        name: listexperiments
        description: List experiments
        call: feature-experimentation-experiments.listexperiments
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createexperiment
        description: Create an experiment
        call: feature-experimentation-experiments.createexperiment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/experiments/{experiment-id}
      name: experiments-experiment-id
      description: REST surface for experiments-experiment_id.
      operations:
      - method: GET
        name: getexperiment
        description: Get an experiment
        call: feature-experimentation-experiments.getexperiment
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateexperiment
        description: Update an experiment
        call: feature-experimentation-experiments.updateexperiment
        with:
          body: rest.body
        outputParameters:
        - type: object
