naftiko: 1.0.0-alpha2
info:
  label: Optimizely Content Delivery API — Content Types
  description: 'Optimizely Content Delivery API — Content Types. 1 operations. Lead operation: List content types. Self-contained
    Naftiko capability covering one Optimizely business surface.'
  tags:
  - Optimizely
  - Content Types
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPTIMIZELY_API_KEY: OPTIMIZELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-delivery-content-types
    baseUri: ''
    description: Optimizely Content Delivery API — Content Types business capability. Self-contained, no shared references.
    resources:
    - name: contenttypes
      path: /contenttypes
      operations:
      - name: listcontenttypes
        method: GET
        description: List content types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.OPTIMIZELY_API_KEY}}'
  exposes:
  - type: rest
    namespace: content-delivery-content-types-rest
    port: 8080
    description: REST adapter for Optimizely Content Delivery API — Content Types. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/contenttypes
      name: contenttypes
      description: REST surface for contenttypes.
      operations:
      - method: GET
        name: listcontenttypes
        description: List content types
        call: content-delivery-content-types.listcontenttypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-delivery-content-types-mcp
    port: 9090
    transport: http
    description: MCP adapter for Optimizely Content Delivery API — Content Types. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-content-types
      description: List content types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-delivery-content-types.listcontenttypes
      outputParameters:
      - type: object
        mapping: $.
