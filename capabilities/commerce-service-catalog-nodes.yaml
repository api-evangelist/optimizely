        name: getcatalognode
        description: Get a catalog node
        call: commerce-service-catalog-nodes.getcatalognode
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecatalognode
        description: Update a catalog node
        call: commerce-service-catalog-nodes.updatecatalognode
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
