naftiko: 1.0.0-alpha2
info:
  label: Optimizely CMP Open REST API — Campaigns
  description: 'Optimizely CMP Open REST API — Campaigns. 2 operations. Lead operation: List campaigns. Self-contained Naftiko
    capability covering one Optimizely business surface.'
  tags:
  - Optimizely
  - Campaigns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPTIMIZELY_API_KEY: OPTIMIZELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: cmp-campaigns
    baseUri: https://api.cmp.optimizely.com/v0
    description: Optimizely CMP Open REST API — Campaigns business capability. Self-contained, no shared references.
    resources:
    - name: campaigns
      path: /campaigns
      operations:
      - name: listcampaigns
        method: GET
        description: List campaigns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: campaigns-campaignId
      path: /campaigns/{campaignId}
      operations:
      - name: getcampaign
        method: GET
        description: Get a campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.OPTIMIZELY_API_KEY}}'
  exposes:
  - type: rest
    namespace: cmp-campaigns-rest
    port: 8080
    description: REST adapter for Optimizely CMP Open REST API — Campaigns. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/campaigns
      name: campaigns
      description: REST surface for campaigns.
      operations:
      - method: GET
        name: listcampaigns
        description: List campaigns
        call: cmp-campaigns.listcampaigns
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/campaigns/{campaignid}
      name: campaigns-campaignid
      description: REST surface for campaigns-campaignId.
      operations:
      - method: GET
        name: getcampaign
        description: Get a campaign
        call: cmp-campaigns.getcampaign
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cmp-campaigns-mcp
    port: 9090
    transport: http
    description: MCP adapter for Optimizely CMP Open REST API — Campaigns. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-campaigns
      description: List campaigns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cmp-campaigns.listcampaigns
      outputParameters:
      - type: object
        mapping: $.
    - name: get-campaign
      description: Get a campaign
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cmp-campaigns.getcampaign
      outputParameters:
      - type: object
        mapping: $.
