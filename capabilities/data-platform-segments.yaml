naftiko: 1.0.0-alpha2
info:
  label: Optimizely Data Platform REST API — Segments
  description: 'Optimizely Data Platform REST API — Segments. 1 operations. Lead operation: List segments. Self-contained
    Naftiko capability covering one Optimizely business surface.'
  tags:
  - Optimizely
  - Segments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPTIMIZELY_API_KEY: OPTIMIZELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-platform-segments
    baseUri: https://api.zaius.com/v3
    description: Optimizely Data Platform REST API — Segments business capability. Self-contained, no shared references.
    resources:
    - name: segments
      path: /segments
      operations:
      - name: listsegments
        method: GET
        description: List segments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.OPTIMIZELY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: data-platform-segments-rest
    port: 8080
    description: REST adapter for Optimizely Data Platform REST API — Segments. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/segments
      name: segments
      description: REST surface for segments.
      operations:
      - method: GET
        name: listsegments
        description: List segments
        call: data-platform-segments.listsegments
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-platform-segments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Optimizely Data Platform REST API — Segments. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-segments
      description: List segments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-platform-segments.listsegments
      outputParameters:
      - type: object
        mapping: $.
