naftiko: 1.0.0-alpha2
info:
  label: Optimizely CMP Open REST API — Content
  description: 'Optimizely CMP Open REST API — Content. 2 operations. Lead operation: List content. Self-contained Naftiko
    capability covering one Optimizely business surface.'
  tags:
  - Optimizely
  - Content
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPTIMIZELY_API_KEY: OPTIMIZELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: cmp-content
    baseUri: https://api.cmp.optimizely.com/v0
    description: Optimizely CMP Open REST API — Content business capability. Self-contained, no shared references.
    resources:
    - name: content
      path: /content
      operations:
      - name: listcontent
        method: GET
        description: List content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: content-contentId
      path: /content/{contentId}
      operations:
      - name: getcontent
        method: GET
        description: Get a content item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.OPTIMIZELY_API_KEY}}'
  exposes:
  - type: rest
    namespace: cmp-content-rest
    port: 8080
    description: REST adapter for Optimizely CMP Open REST API — Content. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/content
      name: content
      description: REST surface for content.
      operations:
      - method: GET
        name: listcontent
        description: List content
        call: cmp-content.listcontent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/content/{contentid}
      name: content-contentid
      description: REST surface for content-contentId.
      operations:
      - method: GET
        name: getcontent
        description: Get a content item
        call: cmp-content.getcontent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cmp-content-mcp
    port: 9090
    transport: http
    description: MCP adapter for Optimizely CMP Open REST API — Content. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-content
      description: List content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cmp-content.listcontent
      outputParameters:
      - type: object
        mapping: $.
    - name: get-content-item
      description: Get a content item
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cmp-content.getcontent
      outputParameters:
      - type: object
        mapping: $.
