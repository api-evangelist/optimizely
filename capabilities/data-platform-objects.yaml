naftiko: 1.0.0-alpha2
info:
  label: Optimizely Data Platform REST API — Objects
  description: 'Optimizely Data Platform REST API — Objects. 2 operations. Lead operation: Create or update objects. Self-contained
    Naftiko capability covering one Optimizely business surface.'
  tags:
  - Optimizely
  - Objects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPTIMIZELY_API_KEY: OPTIMIZELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-platform-objects
    baseUri: https://api.zaius.com/v3
    description: Optimizely Data Platform REST API — Objects business capability. Self-contained, no shared references.
    resources:
    - name: objects-object_type
      path: /objects/{object_type}
      operations:
      - name: upsertobjects
        method: POST
        description: Create or update objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: objects-object_type-object_id
      path: /objects/{object_type}/{object_id}
      operations:
      - name: getobject
        method: GET
        description: Get an object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.OPTIMIZELY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: data-platform-objects-rest
    port: 8080
    description: REST adapter for Optimizely Data Platform REST API — Objects. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/objects/{object-type}
      name: objects-object-type
      description: REST surface for objects-object_type.
      operations:
      - method: POST
        name: upsertobjects
        description: Create or update objects
        call: data-platform-objects.upsertobjects
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/objects/{object-type}/{object-id}
      name: objects-object-type-object-id
      description: REST surface for objects-object_type-object_id.
      operations:
      - method: GET
        name: getobject
        description: Get an object
        call: data-platform-objects.getobject
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-platform-objects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Optimizely Data Platform REST API — Objects. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-update-objects
      description: Create or update objects
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-platform-objects.upsertobjects
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-object
      description: Get an object
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-platform-objects.getobject
      outputParameters:
      - type: object
        mapping: $.
