specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Optimizely
providerId: optimizely
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Experimentation
  - Personalization
  - DXP
description: Optimizely modular pricing across Content Cloud / Commerce Cloud / Intelligence Cloud.
sources:
  - https://www.optimizely.com/plans/
plans:
  - id: optimizely-entry
    name: Entry / Standard
    type: enterprise
    description: From ~$36,000/year annual list.
    entries:
      - label: Annual base
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '36000.00'
        userMultiplied: false
    elements:
      - name: 'Modular: pick CMS / Commerce / Experimentation'
      - name: Per-MTU or per-session usage
      - name: Sales-quoted pricing
  - id: optimizely-mid
    name: Mid-Market
    type: enterprise
    description: Web Experimentation ~$63,700 per 10M impressions.
    entries:
      - label: Annual base
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: '63700.00'
        userMultiplied: false
      - label: Per 10M impressions
        name: impressions
        type: metered
        metric: impression
        limit: -1
        timeFrame: year
        geo: global
        unit: 10000000
        price: '63700.00'
        userMultiplied: false
    elements:
      - name: Web Experimentation A/B + multivariate
      - name: Stats Engine
      - name: Personalization
      - name: Audiences
  - id: optimizely-enterprise
    name: Enterprise
    type: enterprise
    description: $200K-$400K+/year for full DXP suite.
    entries:
      - label: Annual base
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: 200000.00-400000.00+
        userMultiplied: false
    elements:
      - name: Content Cloud (CMS)
      - name: Commerce Cloud
      - name: Intelligence Cloud (Experimentation + Personalization)
      - name: Configured Commerce
      - name: Optimizely AI
