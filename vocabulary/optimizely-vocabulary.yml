name: Optimizely Domain Vocabulary
provider: Optimizely
providerId: optimizely
description: Tag-derived vocabulary for the Optimizely API surface; sourced from openapi/ tags.
terms:
- term: Attributes
  description: Manage custom attributes used for audience targeting and segmentation of experiment results.
- term: Audiences
  description: Create and manage audience segments that control which visitors are included in experiments.
- term: Campaigns
  description: Manage campaigns that group multiple experiments under a single objective with shared traffic allocation.
- term: Events
  description: Manage custom events used as goals and metrics for tracking experiment results.
- term: Experiments
  description: Create, read, update, and manage A/B test experiments including variations, traffic allocation, and experiment
    status.
- term: Extensions
  description: Manage reusable extensions that encapsulate experiment logic and visual changes.
- term: Pages
  description: Manage page definitions that specify which URLs or conditions trigger experiments.
- term: Projects
  description: Manage Optimizely projects, which serve as containers for experiments, audiences, and other resources.
