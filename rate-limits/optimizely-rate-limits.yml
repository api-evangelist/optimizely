specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Optimizely
providerId: optimizely
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Experimentation
description: Optimizely Web/Feature Experimentation REST API rate limits per project.
sources:
  - https://www.optimizely.com/plans/
  - https://docs.developers.optimizely.com/web-experimentation/reference/web-experimentation-api
headers: {}
responseCodes:
  throttled: 429
limits:
  - name: REST API (default)
    scope: project
    metric: requests_per_minute
    limit: 100
    timeFrame: minute
  - name: Datafile fetch
    scope: project
    metric: requests_per_minute
    limit: high (CDN-backed)
  - name: Event ingest
    scope: project
    metric: events_per_second
    limit: scales
