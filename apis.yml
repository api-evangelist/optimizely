- aid: optimizely:feature-experimentation
  name: Optimizely Feature Experimentation REST API
  description: The Optimizely Feature Experimentation REST API enables developers to programmatically manage feature flags,
    experiments, rollouts, and environments within the Optimizely Feature Experimentation platform. It provides endpoints
    for creating and configuring experiments, managing feature variables, and controlling feature rollouts across different
    environments. The API also includes a flags endpoint at api.optimizely.com/flags/v1 for flag-specific operations, and
    supports Bearer token authentication.
  humanURL: https://docs.developers.optimizely.com/feature-experimentation/reference/feature-experimentation-api-overview
  baseURL: https://api.optimizely.com/flags/v1
