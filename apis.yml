- aid: optimizely:commerce-service
  name: Optimizely Commerce Service API
  description: The Optimizely Commerce Service API provides RESTful access to Optimizely's e-commerce platform capabilities.
    It enables developers to manage product catalogs, orders, customers, and inventory programmatically. The API supports
    integration with external commerce systems and enables building custom storefronts and order management workflows on top
    of the Optimizely Commerce platform.
