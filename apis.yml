- aid: optimizely:data-platform
  name: Optimizely Data Platform REST API
  description: The Optimizely Data Platform (ODP) REST API enables developers to integrate customer data with the Optimizely
    Data Platform. It provides endpoints for managing customer profiles, events, segments, and audiences, enabling a unified
    view of customer data across channels. The API supports real-time data ingestion and retrieval, allowing developers to
    build personalized experiences powered by comprehensive customer intelligence.
