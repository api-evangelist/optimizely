    url: json-ld/optimizely-context.jsonld
  - type: JSONSchema
    url: json-schema/optimizely-experiment-schema.json
  - type: JSONSchema
    url: json-schema/optimizely-feature-flag-schema.json
  - type: JSONSchema
    url: json-schema/optimizely-customer-profile-schema.json
