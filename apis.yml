- aid: optimizely:campaign
  name: Optimizely Campaign REST API
  description: The Optimizely Campaign REST API provides programmatic access to Optimizely's email and omnichannel campaign
    management capabilities. Developers can use the API to manage campaigns, recipients, mailing lists, and messaging workflows.
    The API is hosted at api.campaign.episerver.net and supports automation of marketing campaign operations, enabling integration
    with external systems and custom marketing workflows.
