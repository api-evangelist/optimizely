- aid: optimizely:content-delivery
  name: Optimizely Content Delivery API
  description: The Optimizely Content Delivery API is a flexible REST API for building headless CMS solutions with Optimizely
    CMS. It provides a pluggable and configurable web API for querying content, enabling developers to deliver content to
    any frontend framework or channel. The API is distributed as the EPiServer.ContentDeliveryApi.Cms NuGet package and supports
    content retrieval, filtering, and expansion of content references for building decoupled architectures.
  humanURL: https://docs.developers.optimizely.com/content-management-system/v1.5.0-content-delivery-api/docs/content-delivery-api
  tags:
  - Content Delivery
