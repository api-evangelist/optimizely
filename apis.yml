- aid: optimizely:content-management
  name: Optimizely Content Management API
  description: The Optimizely Content Management API provides REST endpoints for performing content operations within Optimizely
    CMS. Developers can create, read, update, and delete content items programmatically, enabling automated content workflows
    and integration with external systems. The API supports managing pages, blocks, media, and other content types within
    the Optimizely CMS ecosystem.
  humanURL: https://docs.developers.optimizely.com/content-management-system/v1.6.0-content-management-api/docs/getting-started
  tags:
