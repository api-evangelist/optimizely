apis:
- aid: optimizely:web-experimentation
  name: Optimizely Web Experimentation REST API
  description: The Optimizely Web Experimentation REST API provides programmatic access to Optimizely's A/B testing and web
    experimentation platform. Developers can manage experiments, projects, audiences, and other resources through RESTful
    endpoints defined using the OpenAPI Specification. The API uses OAuth2 Bearer token authentication and provides access
    to data and services like Stats Engine and customer profiles, enabling integration of experimentation workflows into custom
    applications.
  humanURL: https://docs.developers.optimizely.com/web-experimentation/docs/rest-api-introduction
