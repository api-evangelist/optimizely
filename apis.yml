aid: optimizely
url: https://raw.githubusercontent.com/api-evangelist/optimizely/refs/heads/main/apis.yml
apis:
  - aid: optimizely:web-experimentation-api
    name: Optimizely Web Experimentation REST API
    tags:
      - A/B Testing
      - Experimentation
      - Web Optimization
      - Analytics
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.optimizely.com/v2
    humanURL: https://docs.developers.optimizely.com/web-experimentation/docs/rest-api-introduction
    properties:
      - url: https://docs.developers.optimizely.com/web-experimentation/docs/rest-api-introduction
        type: Documentation
      - url: openapi/optimizely-web-experimentation-openapi.yml
        type: OpenAPI
    description: >-
      The Optimizely Web Experimentation REST API provides programmatic access
      to Optimizely's A/B testing and web experimentation platform. Developers
      can manage experiments, projects, audiences, and other resources through
      RESTful endpoints defined using the OpenAPI Specification. The API uses
      OAuth2 Bearer token authentication and provides access to data and
      services like Stats Engine and customer profiles, enabling integration
      of experimentation workflows into custom applications.
  - aid: optimizely:feature-experimentation-api
    name: Optimizely Feature Experimentation REST API
    tags:
      - Feature Flags
      - Experimentation
      - Feature Management
      - Rollouts
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.optimizely.com/v2
    humanURL: https://docs.developers.optimizely.com/feature-experimentation/reference/feature-experimentation-api-overview
    properties:
      - url: https://docs.developers.optimizely.com/feature-experimentation/reference/feature-experimentation-api-overview
        type: Documentation
      - url: openapi/optimizely-feature-experimentation-openapi.yml
        type: OpenAPI
      - url: asyncapi/optimizely-feature-experimentation-asyncapi.yml
        type: AsyncAPI
    description: >-
      The Optimizely Feature Experimentation REST API enables developers to
      programmatically manage feature flags, experiments, rollouts, and
      environments within the Optimizely Feature Experimentation platform.
      It provides endpoints for creating and configuring experiments, managing
      feature variables, and controlling feature rollouts across different
      environments. The API also includes a flags endpoint at
      api.optimizely.com/flags/v1 for flag-specific operations, and supports
      Bearer token authentication.
  - aid: optimizely:campaign-api
    name: Optimizely Campaign REST API
    tags:
      - Email Marketing
      - Campaigns
      - Marketing Automation
      - Messaging
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.campaign.episerver.net
    humanURL: https://docs.developers.optimizely.com/optimizely-campaign/docs/rest-api
    properties:
      - url: https://docs.developers.optimizely.com/optimizely-campaign/docs/rest-api
        type: Documentation
      - url: openapi/optimizely-campaign-openapi.yml
        type: OpenAPI
    description: >-
      The Optimizely Campaign REST API provides programmatic access to
      Optimizely's email and omnichannel campaign management capabilities.
      Developers can use the API to manage campaigns, recipients, mailing
      lists, and messaging workflows. The API is hosted at
      api.campaign.episerver.net and supports automation of marketing
      campaign operations, enabling integration with external systems and
      custom marketing workflows.
  - aid: optimizely:content-delivery-api
    name: Optimizely Content Delivery API
    tags:
      - Content Management
      - Headless CMS
      - Content Delivery
      - REST
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.developers.optimizely.com/content-management-system/v1.5.0-content-delivery-api/docs/content-delivery-api
    properties:
      - url: https://docs.developers.optimizely.com/content-management-system/v1.5.0-content-delivery-api/docs/content-delivery-api
        type: Documentation
      - url: openapi/optimizely-content-delivery-openapi.yml
        type: OpenAPI
    description: >-
      The Optimizely Content Delivery API is a flexible REST API for building
      headless CMS solutions with Optimizely CMS. It provides a pluggable and
      configurable web API for querying content, enabling developers to deliver
      content to any frontend framework or channel. The API is distributed as
      the EPiServer.ContentDeliveryApi.Cms NuGet package and supports content
      retrieval, filtering, and expansion of content references for building
      decoupled architectures.
  - aid: optimizely:content-management-api
    name: Optimizely Content Management API
    tags:
      - Content Management
      - CMS
      - REST
      - Content Operations
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.developers.optimizely.com/content-management-system/v1.6.0-content-management-api/docs/getting-started
    properties:
      - url: https://docs.developers.optimizely.com/content-management-system/v1.6.0-content-management-api/docs/getting-started
        type: Documentation
      - url: openapi/optimizely-content-management-openapi.yml
        type: OpenAPI
    description: >-
      The Optimizely Content Management API provides REST endpoints for
      performing content operations within Optimizely CMS. Developers can
      create, read, update, and delete content items programmatically,
      enabling automated content workflows and integration with external
      systems. The API supports managing pages, blocks, media, and other
      content types within the Optimizely CMS ecosystem.
  - aid: optimizely:graph-api
    name: Optimizely Graph API
    tags:
      - GraphQL
      - Content Query
      - Search
      - Content Delivery
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.developers.optimizely.com/platform-optimizely/docs/getting-started-with-graphql-api
    properties:
      - url: https://docs.developers.optimizely.com/platform-optimizely/docs/getting-started-with-graphql-api
        type: Documentation
      - url: openapi/optimizely-graph-openapi.yml
        type: OpenAPI
    description: >-
      Optimizely Graph is a unified content query and delivery service that
      provides access to content across Optimizely products through a single
      GraphQL API. It enables flexible data retrieval, high-performance search,
      and dynamic content delivery for both Optimizely CMS and custom
      applications. Developers can explore their content model, run GraphQL
      queries, and power fast content delivery experiences without needing
      to query individual content repositories directly.
  - aid: optimizely:data-platform-api
    name: Optimizely Data Platform REST API
    tags:
      - Customer Data
      - Data Platform
      - CDP
      - Analytics
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.developers.optimizely.com/optimizely-data-platform/reference/introduction
    properties:
      - url: https://docs.developers.optimizely.com/optimizely-data-platform/reference/introduction
        type: Documentation
      - url: openapi/optimizely-data-platform-openapi.yml
        type: OpenAPI
    description: >-
      The Optimizely Data Platform (ODP) REST API enables developers to
      integrate customer data with the Optimizely Data Platform. It provides
      endpoints for managing customer profiles, events, segments, and
      audiences, enabling a unified view of customer data across channels.
      The API supports real-time data ingestion and retrieval, allowing
      developers to build personalized experiences powered by comprehensive
      customer intelligence.
  - aid: optimizely:cmp-api
    name: Optimizely CMP Open REST API
    tags:
      - Content Marketing
      - Content Planning
      - Workflows
      - Marketing
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.cmp.optimizely.com
    humanURL: https://docs.developers.optimizely.com/content-marketing-platform/docs/open-api-introduction
    properties:
      - url: https://docs.developers.optimizely.com/content-marketing-platform/docs/open-api-introduction
        type: Documentation
      - url: openapi/optimizely-cmp-openapi.yml
        type: OpenAPI
      - url: asyncapi/optimizely-cmp-asyncapi.yml
        type: AsyncAPI
    description: >-
      The Optimizely Content Marketing Platform (CMP) Open REST API provides
      programmatic access to Optimizely's content marketing and planning
      tools. Developers can manage content workflows, campaigns, assets, and
      editorial calendars through RESTful endpoints hosted at
      api.cmp.optimizely.com. The API enables integration of content marketing
      operations with external systems, supporting automated content
      production and distribution workflows.
  - aid: optimizely:commerce-service-api
    name: Optimizely Commerce Service API
    tags:
      - E-Commerce
      - Commerce
      - Catalog
      - Orders
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.developers.optimizely.com/commerce-connect/v1.3.0-service-api-developer-guide/docs/optimizely-service-api
    properties:
      - url: https://docs.developers.optimizely.com/commerce-connect/v1.3.0-service-api-developer-guide/docs/optimizely-service-api
        type: Documentation
      - url: openapi/optimizely-commerce-service-openapi.yml
        type: OpenAPI
    description: >-
      The Optimizely Commerce Service API provides RESTful access to
      Optimizely's e-commerce platform capabilities. It enables developers
      to manage product catalogs, orders, customers, and inventory
      programmatically. The API supports integration with external commerce
      systems and enables building custom storefronts and order management
      workflows on top of the Optimizely Commerce platform.
common:
