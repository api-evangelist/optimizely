    content marketing and planning tools. Developers can manage content workflows, campaigns, assets, and editorial calendars
    through RESTful endpoints hosted at api.cmp.optimizely.com. The API enables integration of content marketing operations
    with external systems, supporting automated content production and distribution workflows.
